name: Deploy PWA (GitHub Pages)

# Builda la web app Expo e la pubblica come PWA installabile su iPhone.
# Dopo il primo deploy: Settings → Pages → Source = "GitHub Actions".
# Poi apri https://<utente>.github.io/strategie/ su Safari → Condividi → "Aggiungi a Home".

on:
  push:
    branches:
      - main
      - claude/ftmo-strategy-mobile-app-vr8vyf
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export web (PWA, modalità locale standalone)
        env:
          # Base path del project page GitHub Pages (nome repo).
          EXPO_BASE_URL: /strategie
          # La PWA pubblicata funziona senza backend: tutto in locale sul dispositivo.
          EXPO_PUBLIC_LOCAL_ONLY: "1"
        run: npx expo export --platform web && node scripts/patch-html.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    # Il deploy su GitHub Pages è consentito solo dal branch di default.
    # Sui branch/PR gira solo il job "build" (CI), evitando falsi fallimenti.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
